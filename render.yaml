# Render.com 배포 (대안). Vercel과 달리 Web + Postgres를 한 번에 묶을 수 있다.
services:
  - type: web
    name: whalebell
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: whalebell-db
          property: connectionString

databases:
  - name: whalebell-db
    region: singapore
    plan: free
    databaseName: whalebell
    user: whalebell
